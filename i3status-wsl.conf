general {
    colors = true
    color_good = "#BBBBBB"
    color_bad = "#CC1616"
    color_degraded = "#55858E"
    interval = 5
}

order += "load"
order += "cpu_usage"
order += "tztime local"

load {
    format = "Δ: %1min"
}

cpu_usage {
    format = "%usage"
}

tztime local {
    format = "%Y-%m-%d %H:%M"
}
